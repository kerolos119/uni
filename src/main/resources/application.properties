spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SmartUni;encrypt=true;trustServerCertificate=true
spring.datasource.username=springuser
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

springdoc.swagger-ui.path=/swagger-ui.html

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override via environment variable JWT_SECRET in production
# Must be at least 32 characters for HMAC-SHA256
jwt.secret=${JWT_SECRET:SmartUniProSecretKey2024!@#$%^&*()}
# Token validity: 24 hours
jwt.expiration-ms=86400000

# ── QR Code ───────────────────────────────────────────────────────────────────
# Override via environment variable QR_SECRET in production
qr.secret=${QR_SECRET:SmartUniQRSecretKey2024!@#$%^&*()}
# QR token valid for 5 minutes after session start
qr.validity-minutes=5